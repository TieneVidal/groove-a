# Evolution API local — pra testar o AçaíBot no zap
#
# 1. Sobe:    docker compose -f docker-compose.evolution.yml up -d
# 2. Expõe:   ngrok http 8080   (ou cloudflared tunnel)
# 3. No painel /whatsapp:
#    - Nome da instância: acai-mae (qualquer nome único, sem espaço)
#    - URL Evolution: a URL do ngrok (ex https://abc123.ngrok.app)
#    - API Key: o valor de AUTHENTICATION_API_KEY abaixo
# 4. Clica "Conectar / Gerar QR" e escaneia no WhatsApp.

services:
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=troque-essa-chave-super-secreta
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@evolution-db:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_LOCAL_ENABLED=false
      - CONFIG_SESSION_PHONE_CLIENT=AcaiBot
      - LOG_LEVEL=ERROR,WARN,INFO
      - DEL_INSTANCE=false
    depends_on:
      - evolution-db
      - evolution-redis
    volumes:
      - evolution_instances:/evolution/instances

  evolution-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    volumes:
      - evolution_pg:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - evolution_redis:/data

volumes:
  evolution_instances:
  evolution_pg:
  evolution_redis:
